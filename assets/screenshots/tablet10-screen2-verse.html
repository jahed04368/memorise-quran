<!DOCTYPE html><html><head><meta charset="UTF-8"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1440px;height:2560px;overflow:hidden;background:#1a3a2a}
.w{width:1080px;height:1920px;transform:scale(1.333);transform-origin:top left;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0}
.header{background:#1a3a2a;padding:60px 55px 33px}
.htop{display:flex;align-items:center;margin-bottom:22px}
.back{color:#a8d5b5;font-size:44px;margin-right:22px}
.htitle{color:#fff;font-size:50px;font-weight:700;flex:1}
.harabic{color:#a8d5b5;font-size:42px}
.subnav{background:#1a3a2a;padding:11px 55px 33px;display:flex;align-items:center;justify-content:center;gap:28px}
.navbtn{color:#a8d5b5;font-size:44px;font-weight:300;padding:11px 22px}
.versejump{display:flex;align-items:center;gap:16px}
.vjinput{background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);border-radius:16px;color:#fff;font-size:44px;font-weight:700;width:120px;text-align:center;padding:11px 0}
.vjof{color:#a8d5b5;font-size:39px}
.content{padding:44px 44px 0;overflow:hidden}
.bismillah{font-size:52px;color:#1a3a2a;text-align:center;background:#fff;border-radius:33px;padding:44px 33px;margin-bottom:33px;box-shadow:0 3px 8px rgba(0,0,0,0.06);line-height:1.6;direction:rtl}
.card{background:#fff;border-radius:44px;padding:50px;box-shadow:0 6px 14px rgba(0,0,0,0.07)}
.cardtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:39px}
.vpill{width:94px;height:94px;border-radius:47px;background:#e8f5e9;display:flex;align-items:center;justify-content:center}
.vpilltxt{font-size:36px;font-weight:700;color:#2e7d32}
.mbadge{background:#e8f5e9;padding:11px 28px;border-radius:33px}
.mbadgetxt{font-size:30px;color:#2e7d32;font-weight:600}
.arabic{font-size:72px;line-height:1.7;text-align:right;color:#1a1a1a;direction:rtl;margin-bottom:44px}
.playbtn{width:100%;background:#2e7d32;border-radius:28px;padding:39px;text-align:center;font-size:42px;color:#fff;font-weight:700}
.divider{height:2px;background:#e8f5e9;margin:39px 0}
.translabel{font-size:28px;color:#888;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.trans{font-size:39px;line-height:1.7;color:#444;font-style:italic}
.marklist{display:flex;gap:22px;margin-top:39px}
.markbtn{flex:1;border-radius:28px;padding:33px;text-align:center;font-size:38px;font-weight:700}
.markbtn.green{background:#e8f5e9;color:#2e7d32;border:2.5px solid #4caf50}
.markbtn.grey{background:#f5f5f0;color:#999;border:2.5px solid #ddd}
</style></head><body><div class="w">
<div class="header">
  <div class="htop">
    <span class="back">‹</span>
    <span class="htitle">Al-Fatiha</span>
    <span class="harabic">الفاتحة</span>
  </div>
</div>
<div class="subnav">
  <span class="navbtn">‹</span>
  <div class="versejump">
    <div class="vjinput">1</div>
    <span class="vjof">/ 7</span>
  </div>
  <span class="navbtn">›</span>
</div>
<div class="content">
  <div class="bismillah">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>
  <div class="card">
    <div class="cardtop">
      <div class="vpill"><span class="vpilltxt">1</span></div>
      <div class="mbadge"><span class="mbadgetxt">✓ Memorised</span></div>
    </div>
    <div class="arabic">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>
    <div class="playbtn">▶ Play Recitation</div>
    <div class="divider"></div>
    <div class="translabel">Translation</div>
    <div class="trans">In the name of Allah, the Entirely Merciful, the Especially Merciful.</div>
    <div class="marklist">
      <div class="markbtn green">✓ Memorised</div>
      <div class="markbtn grey">Mark as not memorised</div>
    </div>
  </div>
</div>
</div></body></html>
