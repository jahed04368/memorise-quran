<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    background: #1a3a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 48px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .icon {
    width: 180px;
    height: 180px;
    border-radius: 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    flex-shrink: 0;
  }
  .text {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .arabic {
    font-size: 42px;
    color: #a8d5b5;
    direction: rtl;
    letter-spacing: 2px;
  }
  .name {
    font-size: 52px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -1px;
    line-height: 1;
  }
  .tagline {
    font-size: 20px;
    color: rgba(255,255,255,0.55);
    font-weight: 400;
    margin-top: 4px;
  }
  .bar {
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
    margin-top: 16px;
    overflow: hidden;
  }
  .bar-fill {
    width: 35%;
    height: 100%;
    background: #4caf50;
    border-radius: 3px;
  }
</style>
</head>
